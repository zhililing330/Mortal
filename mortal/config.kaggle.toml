# Kaggle offline/local training config.
# Copy or select this file with:
#   MORTAL_CFG=config.kaggle.toml python train.py

[control]
version = 4
online = false

state_file = 'local_models/mortal_pretrain_restart.pth'
best_state_file = 'local_models/best_pretrain_restart.pth'
candidate_state_file = 'local_models/candidate_pretrain_restart.pth'
tensorboard_dir = '/kaggle/working/mortal_outputs/tensorboard_pretrain_restart'

device = 'cuda:0'
enable_cudnn_benchmark = true
enable_amp = true
enable_compile = true
reset_optimizer_on_load = true
reset_scaler_on_load = true
reset_steps_on_load = true

batch_size = 512
opt_step_every = 1

save_every = 400
test_every = 8000
submit_every = 400
max_train_steps_per_run = 85000

[train_play.default]
games = 800
log_dir = '/kaggle/working/mortal_outputs/train_play'
boltzmann_epsilon = 0.005
boltzmann_temp = 0.05
top_p = 1.0
repeats = 1

[test_play]
games = 2000
log_dir = '/kaggle/working/mortal_outputs/test_play'

[dataset]
globs = [
    '/kaggle/input/mortal-1v3-data/**/*.json.gz',
    '/kaggle/working/mortal_outputs/1v3_pretrain_restart/**/*.json.gz',
]
file_index = '/kaggle/working/mortal_outputs/1v3_pretrain_restart_file_index.pth'
rebuild_file_index = true
modified_after = ''
file_batch_size = 60
reserve_ratio = 0.0
num_workers = 2
player_names_files = ['player_names_mortal.txt']
num_epochs = 1
enable_augmentation = true
augmented_first = false

[env]
gamma = 1
pts = [3.0, 1.5, 0.0, -4.5]

[resnet]
conv_channels = 192
num_blocks = 40

[dqn]
head = 'legacy'
hidden_size = 512
num_layers = 2
activation = 'mish'
dropout = 0.0

[loss]
q_loss = 'mse'
huber_delta = 1.0
bc_weight = 0.0
bc_temperature = 1.0

[adaptive]
enabled = false
reset_state_on_load = true
candidate_enabled = true
candidate_min_avg_pt = 0.3
candidate_max_avg_rank = 2.5
confirm_games = 8000
confirm_min_avg_pt = 1.0
confirm_max_avg_rank = 2.49
confirm_compare_best = true
confirm_min_delta_best_pt = 0.25
metric = 'joint'
patience = 2
lr_factor = 0.5
min_lr = 2e-5
min_delta_pt = 1.0
min_delta_rank = 0.01
stop_after_lr_floor_patience = 3

[cql]
min_q_weight = 5

[aux]
next_rank_weight = 0.2

[freeze_bn]
mortal = true

[freeze_params]
mortal = true

[optim]
eps = 1e-8
betas = [0.9, 0.999]
weight_decay = 0.1
max_grad_norm = 0

[optim.scheduler]
peak = 8e-5
final = 4e-5
warm_up_steps = 1000
max_steps = 80000

[baseline.train]
device = 'cuda:0'
enable_compile = true
state_file = 'local_models/baseline.pth'

[baseline.test]
device = 'cuda:0'
enable_compile = true
state_file = 'local_models/baseline.pth'

[online]
history_window = 50
enable_compile = false

[online.remote]
host = '127.0.0.1'
port = 5000

[online.server]
buffer_dir = '/kaggle/working/mortal_outputs/buffer'
drain_dir = '/kaggle/working/mortal_outputs/drain'
sample_reuse_rate = 0
sample_reuse_threshold = 0
capacity = 1600
force_sequential = false

[1v3]
seed_key = -1
mode = 'eval'
games_per_iter = 8000
iters = 1
log_dir = '/kaggle/working/mortal_outputs/1v3_pretrain_restart'
eval_log_dir = '/kaggle/working/mortal_outputs/1v3_eval_pretrain_restart'

[1v3.challenger]
device = 'cuda:0'
name = 'mortal'
state_file = 'local_models/best_pretrain_restart.pth'
stochastic_latent = false
enable_compile = true
enable_amp = true
enable_rule_based_agari_guard = true

[1v3.champion]
device = 'cuda:0'
name = 'baseline'
state_file = 'local_models/baseline.pth'
stochastic_latent = false
enable_compile = true
enable_amp = true
enable_rule_based_agari_guard = true

[1v3.akochan]
enabled = false
dir = '/path/to/akochan'
tactics = '/path/to/tactics.json'

[grp]
state_file = 'local_models/grp_final.pth'

[grp.network]
hidden_size = 64
num_layers = 2

[grp.control]
device = 'cuda:0'
enable_cudnn_benchmark = false
tensorboard_dir = '/kaggle/working/mortal_outputs/grp_log'

batch_size = 512
save_every = 2000
val_steps = 400

[grp.dataset]
train_globs = []
val_globs = []
file_index = '/kaggle/working/mortal_outputs/grp_file_index.pth'
file_batch_size = 50

[grp.optim]
lr = 1e-5
